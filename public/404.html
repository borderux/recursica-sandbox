<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recursica Sandbox</title>
    <script>
      // GitHub Pages 404.html routing
      // This handles direct navigation to Storybook builds and PR previews

      function handleRouting() {
        const path = window.location.pathname;
        const pathSegments = path.split('/').filter((segment) => segment);

        // If we're at the root, serve the main app
        if (pathSegments.length === 0) {
          window.location.href = '/?path=' + encodeURIComponent(path);
          return;
        }

        let buildPath = '';

        // Check if the path is a PR preview
        if (pathSegments[0] === 'pr-preview' && pathSegments.length >= 2) {
          const prFolder = pathSegments[1];
          buildPath = `/pr-preview/${prFolder}/index.html`;
        } else {
          // Check if the first segment matches a legacy build folder
          const buildFolder = pathSegments[0];
          buildPath = `/builds/${buildFolder}/index.html`;
        }

        // Try to fetch the build's index.html to see if it exists
        fetch(buildPath, { method: 'HEAD' })
          .then((response) => {
            if (response.ok) {
              // Build exists, redirect to it, preserving query string and hash
              window.location.href = buildPath + window.location.search + window.location.hash;
            } else {
              // Build doesn't exist, serve main app
              window.location.href = '/?path=' + encodeURIComponent(path);
            }
          })
          .catch(() => {
            // Error occurred, serve main app
            window.location.href = '/?path=' + encodeURIComponent(path);
          });
      }

      // Run the routing check
      handleRouting();
    </script>
  </head>
  <body>
    <div>Redirecting...</div>
  </body>
</html>
